<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Азамат Курултаев</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .name {
      font-size: clamp(2.8rem, 9vw, 5.5rem);
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1.05;
    }
    .name span { color: #6ee7b7; }

    .divider {
      width: 40px;
      height: 2px;
      background: #6ee7b7;
      margin: 2rem auto;
    }

    .contacts {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #888;
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.2s;
    }
    .contact-item:hover { color: #6ee7b7; }
    .contact-item svg {
      width: 20px;
      height: 20px;
      color: #6ee7b7;
      flex-shrink: 0;
    }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: #3a3a3a;
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(6px); }
    }

    /* ── Form section ── */
    .form-section {
      padding: 5rem 2rem 6rem;
      max-width: 560px;
      margin: 0 auto;
    }

    .form-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2.5rem;
    }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #6ee7b7;
      margin-bottom: 0.75rem;
    }

    h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .form-desc {
      color: #777;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .form-group { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.5rem;
    }

    input, textarea {
      width: 100%;
      background: #242424;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 0.9rem 1rem;
      color: #fff;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }
    input::placeholder, textarea::placeholder { color: #555; }
    input:focus, textarea:focus { border-color: #6ee7b7; }

    textarea { height: 140px; resize: vertical; }

    .submit-btn {
      width: 100%;
      background: #6ee7b7;
      color: #0f0f0f;
      border: none;
      border-radius: 10px;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 0.5rem;
      letter-spacing: 0.5px;
    }
    .submit-btn:hover  { opacity: 0.88; }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .form-status {
      margin-top: 1rem;
      padding: 1rem 1.25rem;
      border-radius: 10px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }
    .form-status.success { background: #0d2e20; color: #6ee7b7; display: block; }
    .form-status.error   { background: #2e0d0d; color: #f87171; display: block; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem;
      color: #2a2a2a;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <div>
      <h1 class="name">Азамат<br><span>Курултаев</span></h1>
      <div class="divider"></div>
      <div class="contacts">

        <a id="tg-link" class="contact-item" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
          </svg>
          <canvas id="tg-canvas" style="vertical-align:middle"></canvas>
        </a>

        <a id="email-link" class="contact-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="16" x="2" y="4" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          <canvas id="email-canvas" style="vertical-align:middle"></canvas>
        </a>

      </div>
    </div>
    <div class="scroll-hint">↓ написать мне</div>
  </section>

  <!-- Contact Form -->
  <section class="form-section">
    <div class="form-card">
      <p class="section-label">Обратная связь</p>
      <h2>Напишите мне</h2>
      <p class="form-desc">Оставьте сообщение — я отвечу в ближайшее время.</p>

      <form id="contactForm" novalidate>
        <div class="form-group">
          <label for="fname">Ваше имя</label>
          <input id="fname" type="text" name="name" placeholder="Иван Иванов" required>
        </div>
        <div class="form-group">
          <label for="fcontact">Контакт для ответа</label>
          <input id="fcontact" type="text" name="contact" placeholder="Telegram, email или телефон" required>
        </div>
        <div class="form-group">
          <label for="fmessage">Сообщение</label>
          <textarea id="fmessage" name="message" placeholder="Ваш вопрос или предложение..." required></textarea>
        </div>
        <div class="cf-turnstile" data-sitekey="0x4AAAAAACrQnUKFPyd0n_l8" data-theme="dark" style="margin-bottom: 0.75rem;"></div>
        <button type="submit" class="submit-btn" id="submitBtn">Отправить сообщение</button>
        <div class="form-status" id="formStatus"></div>
      </form>
    </div>
  </section>

  <footer>azamat.uz</footer>

  <script>
    document.getElementById('contactForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const btn    = document.getElementById('submitBtn');
      const status = document.getElementById('formStatus');
      const form   = e.target;

      const name    = form.name.value.trim();
      const contact = form.contact.value.trim();
      const message = form.message.value.trim();
      const token   = form['cf-turnstile-response']?.value || '';

      if (!name || !contact || !message) {
        status.className = 'form-status error';
        status.textContent = 'Пожалуйста, заполните все поля.';
        return;
      }

      if (!token) {
        status.className = 'form-status error';
        status.textContent = 'Пожалуйста, подтвердите, что вы не робот.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Отправляю...';
      status.className = 'form-status';

      try {
        const res = await fetch('/.netlify/functions/send-message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, contact, message, token })
        });
        const data = await res.json();

        if (data.ok) {
          status.className = 'form-status success';
          status.textContent = '✓ Сообщение отправлено! Я отвечу вам в ближайшее время.';
          form.reset();
          if (window.turnstile) turnstile.reset();
        } else {
          throw new Error(data.error);
        }
      } catch (err) {
        status.className = 'form-status error';
        status.textContent = 'Не удалось отправить. Используйте контакты выше.';
      }

      btn.disabled = false;
      btn.textContent = 'Отправить сообщение';
    });

  // Контакты — рисуем через canvas, чтобы боты не читали из HTML
  (function () {
    const p1 = 'azamat', p2 = '_kurultaev';
    const tgUser  = p1 + p2;
    const emailDomain = p1 + '.uz';

    document.getElementById('tg-link').href    = 'https://t.me/' + tgUser;
    document.getElementById('email-link').href = 'mailto:' + p1 + p2.replace('_', '') + '@' + emailDomain;

    function draw(id, text, color) {
      const c = document.getElementById(id);
      const ctx = c.getContext('2d');
      const font = '16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      ctx.font = font;
      const w = Math.ceil(ctx.measureText(text).width) + 2;
      c.width = w; c.height = 20;
      ctx.font = font;
      ctx.fillStyle = color;
      ctx.textBaseline = 'middle';
      ctx.fillText(text, 1, 10);
    }

    const NORMAL = '#ffffff', HOVER = '#6ee7b7';
    draw('tg-canvas',    '@' + tgUser,                          NORMAL);
    draw('email-canvas', p1 + p2.replace('_', '') + '@' + emailDomain, NORMAL);

    function hover(linkId, canvasId, text, on) {
      document.getElementById(linkId).addEventListener(on ? 'mouseenter' : 'mouseleave', function () {
        draw(canvasId, text, on ? HOVER : NORMAL);
      });
    }
    var tgText    = '@' + tgUser;
    var emailText = p1 + p2.replace('_', '') + '@' + emailDomain;
    hover('tg-link',    'tg-canvas',    tgText,    true);
    hover('tg-link',    'tg-canvas',    tgText,    false);
    hover('email-link', 'email-canvas', emailText, true);
    hover('email-link', 'email-canvas', emailText, false);
  })();
  </script>

</body>
</html>
