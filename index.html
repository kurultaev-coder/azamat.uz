<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azamat Kurultayev</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
    }

    /* ── Language switcher ── */
    .lang-switcher {
      position: fixed;
      top: 1.25rem;
      right: 1.5rem;
      display: flex;
      gap: 4px;
      z-index: 100;
    }
    .lang-btn {
      background: none;
      border: 1px solid #333;
      border-radius: 6px;
      color: #555;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 4px 8px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .lang-btn:hover { color: #aaa; border-color: #555; }
    .lang-btn.active { color: #6ee7b7; border-color: #6ee7b7; }

    /* ── Hero ── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .name {
      font-size: clamp(2.8rem, 9vw, 5.5rem);
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1.05;
    }
    .name span { color: #6ee7b7; }

    .divider {
      width: 40px;
      height: 2px;
      background: #6ee7b7;
      margin: 2rem auto;
    }

    .contacts {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #888;
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.2s;
    }
    .contact-item:hover { color: #6ee7b7; }
    .contact-item svg {
      width: 20px;
      height: 20px;
      color: #6ee7b7;
      flex-shrink: 0;
    }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: #888;
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      animation: bounce 2s infinite;
      white-space: nowrap;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(6px); }
    }

    /* ── Form section ── */
    .form-section {
      padding: 5rem 2rem 6rem;
      max-width: 560px;
      margin: 0 auto;
    }

    .form-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2.5rem;
    }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #6ee7b7;
      margin-bottom: 0.75rem;
    }

    h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .form-desc {
      color: #777;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .form-group { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.5rem;
    }

    input, textarea {
      width: 100%;
      background: #242424;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 0.9rem 1rem;
      color: #fff;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }
    input::placeholder, textarea::placeholder { color: #555; }
    input:focus, textarea:focus { border-color: #6ee7b7; }

    textarea { height: 140px; resize: vertical; }

    .submit-btn {
      width: 100%;
      background: #6ee7b7;
      color: #0f0f0f;
      border: none;
      border-radius: 10px;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 0.5rem;
      letter-spacing: 0.5px;
    }
    .submit-btn:hover  { opacity: 0.88; }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .form-status {
      margin-top: 1rem;
      padding: 1rem 1.25rem;
      border-radius: 10px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }
    .form-status.success { background: #0d2e20; color: #6ee7b7; display: block; }
    .form-status.error   { background: #2e0d0d; color: #f87171; display: block; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem;
      color: #2a2a2a;
      font-size: 0.8rem;
    }
    .visit-counter {
      margin-top: 0.5rem;
      font-size: 0.7rem;
      color: #222;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- Language Switcher -->
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="uz">UZ</button>
    <button class="lang-btn" data-lang="ru">RU</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <!-- Hero -->
  <section class="hero">
    <div>
      <h1 class="name" id="heroName">Azamat<br><span>Kurultayev</span></h1>
      <div class="divider"></div>
      <div class="contacts">

        <a id="tg-link" class="contact-item" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
          </svg>
          <img id="tg-img" src="tg-contact.png" alt="Telegram" style="vertical-align:middle;height:21px">
        </a>

        <a id="email-link" class="contact-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="16" x="2" y="4" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          <img id="email-img" src="email-contact.png" alt="Email" style="vertical-align:middle;height:21px">
        </a>

      </div>
    </div>
    <div class="scroll-hint" id="scrollHint">↓ menga yozing</div>
  </section>

  <!-- Contact Form -->
  <section class="form-section">
    <div class="form-card">
      <p class="section-label" id="formLabel">Aloqa</p>
      <h2 id="formTitle">Menga yozing</h2>
      <p class="form-desc" id="formDesc">Xabar qoldiring — tez orada javob beraman.</p>

      <form id="contactForm" novalidate>
        <div class="form-group">
          <label for="fname" id="labelName">Ismingiz</label>
          <input id="fname" type="text" name="name" placeholder="Jasur Yusupov" required>
        </div>
        <div class="form-group">
          <label for="fcontact" id="labelContact">Javob uchun aloqa</label>
          <input id="fcontact" type="text" name="contact" placeholder="Telegram, email yoki telefon" required>
        </div>
        <div class="form-group">
          <label for="fmessage" id="labelMessage">Xabar</label>
          <textarea id="fmessage" name="message" placeholder="Savolingiz yoki taklifingiz..." required></textarea>
        </div>
        <div class="cf-turnstile" data-sitekey="0x4AAAAAACrQnUKFPyd0n_l8" data-theme="dark" style="margin-bottom: 0.75rem;"></div>
        <button type="submit" class="submit-btn" id="submitBtn">Xabar yuborish</button>
        <div class="form-status" id="formStatus"></div>
      </form>
    </div>
  </section>

  <footer>
    azamat.uz
    <div class="visit-counter">&#128065; <span id="visitCount">…</span></div>
  </footer>

  <script>
    // ── Переводы ──────────────────────────────────────────────
    const i18n = {
      ru: {
        lang:             'ru',
        title:            'Азамат Курултаев',
        heroName:         'Азамат<br><span>Курултаев</span>',
        scrollHint:       '↓ написать мне',
        formLabel:        'Обратная связь',
        formTitle:        'Напишите мне',
        formDesc:         'Оставьте сообщение — я отвечу в ближайшее время.',
        labelName:        'Ваше имя',
        placeholderName:  'Иван Иванов',
        labelContact:     'Контакт для ответа',
        placeholderContact: 'Telegram, email или телефон',
        labelMessage:     'Сообщение',
        placeholderMessage: 'Ваш вопрос или предложение...',
        submitBtn:        'Отправить сообщение',
        sending:          'Отправляю...',
        errFields:        'Пожалуйста, заполните все поля.',
        errCaptcha:       'Пожалуйста, подтвердите, что вы не робот.',
        errFail:          'Не удалось отправить. Используйте контакты выше.',
        success:          '✓ Сообщение отправлено! Я отвечу вам в ближайшее время.',
      },
      en: {
        lang:             'en',
        title:            'Azamat Kurultaev',
        heroName:         'Azamat<br><span>Kurultaev</span>',
        scrollHint:       '↓ write to me',
        formLabel:        'Contact',
        formTitle:        'Get in touch',
        formDesc:         'Leave a message — I\'ll get back to you shortly.',
        labelName:        'Your name',
        placeholderName:  'John Smith',
        labelContact:     'How to reach you',
        placeholderContact: 'Telegram, email or phone',
        labelMessage:     'Message',
        placeholderMessage: 'Your question or proposal...',
        submitBtn:        'Send message',
        sending:          'Sending...',
        errFields:        'Please fill in all fields.',
        errCaptcha:       'Please confirm you\'re not a robot.',
        errFail:          'Failed to send. Please use the contacts above.',
        success:          '✓ Message sent! I\'ll get back to you shortly.',
      },
      uz: {
        lang:             'uz',
        title:            'Azamat Kurultayev',
        heroName:         'Azamat<br><span>Kurultayev</span>',
        scrollHint:       '↓ menga yozing',
        formLabel:        'Aloqa',
        formTitle:        'Menga yozing',
        formDesc:         'Xabar qoldiring — tez orada javob beraman.',
        labelName:        'Ismingiz',
        placeholderName:  'Jasur Yusupov',
        labelContact:     'Javob uchun aloqa',
        placeholderContact: 'Telegram, email yoki telefon',
        labelMessage:     'Xabar',
        placeholderMessage: 'Savolingiz yoki taklifingiz...',
        submitBtn:        'Xabar yuborish',
        sending:          'Yuborilmoqda...',
        errFields:        'Iltimos, barcha maydonlarni to\'ldiring.',
        errCaptcha:       'Iltimos, siz robot emasligingizni tasdiqlang.',
        errFail:          'Yuborib bo\'lmadi. Yuqoridagi kontaktlardan foydalaning.',
        success:          '✓ Xabar yuborildi! Tez orada javob beraman.',
      },
    };

    // ── Применить язык ────────────────────────────────────────
    function applyLang(code) {
      const t = i18n[code];
      if (!t) return;

      document.documentElement.lang           = t.lang;
      document.title                          = t.title;
      document.getElementById('heroName').innerHTML      = t.heroName;
      document.getElementById('scrollHint').textContent  = t.scrollHint;
      document.getElementById('formLabel').textContent   = t.formLabel;
      document.getElementById('formTitle').textContent   = t.formTitle;
      document.getElementById('formDesc').textContent    = t.formDesc;
      document.getElementById('labelName').textContent   = t.labelName;
      document.getElementById('fname').placeholder       = t.placeholderName;
      document.getElementById('labelContact').textContent  = t.labelContact;
      document.getElementById('fcontact').placeholder     = t.placeholderContact;
      document.getElementById('labelMessage').textContent  = t.labelMessage;
      document.getElementById('fmessage').placeholder     = t.placeholderMessage;

      const btn = document.getElementById('submitBtn');
      if (!btn.disabled) btn.textContent = t.submitBtn;

      document.querySelectorAll('.lang-btn').forEach(function (b) {
        b.classList.toggle('active', b.dataset.lang === code);
      });

      localStorage.setItem('lang', code);
      window._currentLang = code;
    }

    // ── Переключатель ─────────────────────────────────────────
    document.querySelectorAll('.lang-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        applyLang(btn.dataset.lang);
      });
    });

    // ── Инициализация языка ───────────────────────────────────
    (function () {
      const saved = localStorage.getItem('lang');
      applyLang(i18n[saved] ? saved : 'uz');
    })();

    // ── Форма ─────────────────────────────────────────────────
    document.getElementById('contactForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const btn    = document.getElementById('submitBtn');
      const status = document.getElementById('formStatus');
      const form   = e.target;
      const t      = i18n[window._currentLang] || i18n.ru;

      const name    = form.name.value.trim();
      const contact = form.contact.value.trim();
      const message = form.message.value.trim();
      const token   = form['cf-turnstile-response']?.value || '';

      if (!name || !contact || !message) {
        status.className = 'form-status error';
        status.textContent = t.errFields;
        return;
      }

      if (!token) {
        status.className = 'form-status error';
        status.textContent = t.errCaptcha;
        return;
      }

      btn.disabled = true;
      btn.textContent = t.sending;
      status.className = 'form-status';

      try {
        const res = await fetch('/.netlify/functions/send-message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, contact, message, token })
        });
        const data = await res.json();

        if (data.ok) {
          status.className = 'form-status success';
          status.textContent = t.success;
          form.reset();
          if (window.turnstile) turnstile.reset();
        } else {
          throw new Error(data.error);
        }
      } catch (err) {
        status.className = 'form-status error';
        status.textContent = t.errFail;
      }

      btn.disabled = false;
      btn.textContent = t.submitBtn;
    });

    // ── Счётчик посещений ─────────────────────────────────────
    (function () {
      fetch('https://api.counterapi.dev/v1/azamat-uz/visits/up')
        .then(function (r) { return r.json(); })
        .then(function (d) {
          var el = document.getElementById('visitCount');
          if (el && d.count) el.textContent = Number(d.count).toLocaleString();
        })
        .catch(function () {});
    })();

    // ── Контакты (защита от ботов) ────────────────────────────
    (function () {
      const u = 'kurultaev', d = 'azamat.uz', tg = 'azamat_kurultaev';
      document.getElementById('tg-link').href    = 'https://t.me/' + tg;
      document.getElementById('email-link').href = 'mailto:' + u + '@' + d;

      document.getElementById('tg-link').addEventListener('mouseenter',    function () { document.getElementById('tg-img').src    = 'tg-contact-hover.png'; });
      document.getElementById('tg-link').addEventListener('mouseleave',    function () { document.getElementById('tg-img').src    = 'tg-contact.png'; });
      document.getElementById('email-link').addEventListener('mouseenter', function () { document.getElementById('email-img').src = 'email-contact-hover.png'; });
      document.getElementById('email-link').addEventListener('mouseleave', function () { document.getElementById('email-img').src = 'email-contact.png'; });
    })();
  </script>

</body>
</html>
